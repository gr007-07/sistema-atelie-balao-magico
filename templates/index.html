<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criativa - Faça seu Pedido</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>✨ Criativa - Loja dos Personalizados ✨</h1>
      <p>Crie o pedido perfeito para sua festa! Envie referências e detalhes para o nosso time realizar a magia.</p>
      <a class="secondary-link" href="/acompanhar-pedido">🔎 Acompanhar meu pedido</a>
    </section>

    <form id="form-pedido" action="/api/novo-pedido" method="post" enctype="multipart/form-data" class="card">
      <h2>Formulário de Pedido</h2>

      <div class="grid">
        <label>👤 Nome do cliente
          <input type="text" name="nome_cliente" placeholder="Seu nome completo" required />
        </label>
        <label>📱 Telefone (WhatsApp)
          <input type="text" name="telefone" placeholder="(11) 99999-9999" required />
        </label>
        <label>📧 E-mail
          <input type="email" name="email" placeholder="seu@email.com" required />
        </label>
        <label>🎉 Data da festa
          <input type="date" name="data_festa" required />
        </label>
        <label>📦 Data de entrega
          <input type="date" name="data_entrega" required />
        </label>
        <label>🎨 Tema da festa
          <input type="text" name="tema" placeholder="Ex: Frozen, Mundo Bita..." required />
        </label>
        <label>🌈 Cores principais
          <input type="text" name="cores" placeholder="Ex: Azul e branco" required />
        </label>
        <label>🎂 Nome do aniversariante
          <input type="text" name="nome_aniv" placeholder="Nome da criança" required />
        </label>
        <label>🎈 Idade
          <input type="number" name="idade" placeholder="Quantos anos?" required />
        </label>
        <label>⚖️ Tamanho do bolo (kg)
          <input type="number" step="0.1" name="tamanho_bolo" placeholder="Ex: 1.5" required />
        </label>
      </div>

      <label>💭 Observações (opcional)
        <textarea name="observacoes" rows="4" placeholder="Conte detalhes especiais, preferências ou restrições alimentares..."></textarea>
      </label>

      <label>📸 Anexar fotos de exemplo (opcional)
        <input type="file" name="arquivos" multiple accept="image/*" />
      </label>

      <button type="submit">✨ Enviar Pedido ✨</button>
      <p id="resultado-pedido" class="resultado-status" hidden aria-live="polite"></p>
    </form>
  </main>

  <script>
    document.getElementById('form-pedido').addEventListener('submit', async (event) => {
      event.preventDefault();
      const formulario = event.currentTarget;
      const resultado = document.getElementById('resultado-pedido');
      const botao = formulario.querySelector('button[type="submit"]');
      botao.disabled = true;
      resultado.hidden = false;
      resultado.textContent = 'Enviando pedido...';

      try {
        const resposta = await fetch(formulario.action, {
          method: 'POST',
          body: new FormData(formulario)
        });
        const dados = await resposta.json();
        if (!resposta.ok) throw new Error(dados.detail || 'Não foi possível enviar o pedido.');
        resultado.innerHTML = `✅ ${dados.mensagem}<br>Guarde o número <strong>#${dados.id_pedido}</strong>. <a href="/acompanhar-pedido?pedido=${dados.id_pedido}">Acompanhar status</a>`;
        formulario.reset();
      } catch (erro) {
        resultado.textContent = `❌ ${erro.message}`;
      } finally {
        botao.disabled = false;
      }
    });
  </script>
</body>
</html>

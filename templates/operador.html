<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Operador - Criativa</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>📊 Painel do Operador</h1>
      <p>Acompanhe os pedidos recebidos em tempo real e atualize o status de cada um.</p>
      <a class="secondary-link" href="/logout">🚪 Sair da Conta</a>
    </section>

    <section class="card">
      <h2>Pedidos Recebidos</h2>
      <div id="pedidos-lista" class="pedido-lista"></div>
    </section>
  </main>

  <script>
    async function carregarPedidos() {
      const resposta = await fetch('/api/pedidos');
      const dados = await resposta.json();
      const container = document.getElementById('pedidos-lista');

      if (!dados.pedidos || dados.pedidos.length === 0) {
        container.innerHTML = '<p style="color: #001a4d; text-align: center; padding: 20px;">Nenhum pedido recebido ainda.</p>';
        return;
      }

      container.innerHTML = dados.pedidos.map((pedido) => `
        <article class="pedido-card">
          <div class="pedido-header">
            <h3>#${pedido.id_pedido} - ${pedido.cliente_nome}</h3>
            <span class="status-badge">${pedido.status}</span>
          </div>
          <p><strong>📱 Telefone:</strong> ${pedido.telefone}</p>
          <p><strong>📧 E-mail:</strong> ${pedido.email}</p>
          <p><strong>🎉 Data da festa:</strong> ${new Date(pedido.data_festa).toLocaleDateString('pt-BR')}</p>
          <p><strong>📦 Data de entrega:</strong> ${new Date(pedido.data_entrega).toLocaleDateString('pt-BR')}</p>
          <p><strong>🎨 Tema:</strong> ${pedido.tema}</p>
          <p><strong>🌈 Cores:</strong> ${pedido.cores}</p>
          <p><strong>🎂 Aniversariante:</strong> ${pedido.nome_aniv} (${pedido.idade} anos)</p>
          <p><strong>⚖️ Tamanho do bolo:</strong> ${pedido.tamanho_bolo}kg</p>
          ${pedido.observacoes ? `<p><strong>💭 Observações:</strong> ${pedido.observacoes}</p>` : ''}
          <div class="fotos">
            ${pedido.fotos_exemplo && pedido.fotos_exemplo.length ? pedido.fotos_exemplo.map((foto) => `<img src="${foto}" alt="Referência do pedido" title="Clique para ampliar" />`).join('') : '<p style="color: #999;">Sem fotos anexadas.</p>'}
          </div>
          <label style="color: #001a4d;">
            Atualizar status
            <select data-id="${pedido.id_pedido}" style="color: #001a4d;">
              <option value="Orçamento" ${pedido.status === 'Orçamento' ? 'selected' : ''}>Orçamento</option>
              <option value="Confirmado" ${pedido.status === 'Confirmado' ? 'selected' : ''}>Confirmado</option>
              <option value="Em produção" ${pedido.status === 'Em produção' ? 'selected' : ''}>Em produção</option>
              <option value="Pronto para entrega" ${pedido.status === 'Pronto para entrega' ? 'selected' : ''}>Pronto para entrega</option>
              <option value="Entregue" ${pedido.status === 'Entregue' ? 'selected' : ''}>Entregue</option>
            </select>
          </label>
          <button type="button" onclick="atualizarStatus(${pedido.id_pedido})">💾 Salvar Status</button>
        </article>
      `).join('');
    }

    async function atualizarStatus(id) {
      const select = document.querySelector(`select[data-id="${id}"]`);
      const novoStatus = select.value;
      try {
        const resposta = await fetch(`/api/pedidos/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ novo_status: novoStatus })
        });
        if (resposta.ok) {
          alert('✅ Status atualizado com sucesso!');
          carregarPedidos();
        }
      } catch (erro) {
        alert('❌ Erro ao atualizar status: ' + erro.message);
      }
    }

    // Carregar pedidos ao abrir a página
    carregarPedidos();
    // Atualizar a cada 10 segundos
    setInterval(carregarPedidos, 10000);
  </script>
</body>
</html>

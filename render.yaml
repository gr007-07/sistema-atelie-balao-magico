services:
  - type: web
    name: atelie-balao-magico
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_atelie:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: COOKIE_SECURE
        value: "true"
